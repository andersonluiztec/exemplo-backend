steps:

  # =========================
  # 🔌 DEPLOY BACKEND NA VM
  # =========================
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - -c
      - |
        echo "🔌 Conectando na VM e atualizando backend..."

        gcloud compute ssh vm-exemplo-backend --zone=us-west1-b --tunnel-through-iap --command="
          echo '📥 Atualizando código...'
          cd /home/anderson/backend &&

          git pull &&

          echo '🐍 Ativando venv...'
          source venv/bin/activate &&

          echo '📦 Instalando dependências...'
          pip install -r requirements.txt &&

          echo '🔄 Reiniciando aplicação...'
          pkill gunicorn;

          nohup gunicorn -b 0.0.0.0:8080 app:app > app.log 2>&1 &
        "

options:
  logging: CLOUD_LOGGING_ONLY